name: Keep Render Backend Warm

on:
  # schedule disabled — cron-job.org handles keep-alive more reliably.
  # Re-enable by uncommenting the schedule block below.
  # schedule:
  #   - cron: "*/10 0-6,13-23 * * *"
  workflow_dispatch: # allow manual firing from Actions tab

jobs:
  ping:
    name: Ping health endpoint
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Curl health
        run: |
          curl --fail --max-time 60 --retry 3 --retry-delay 5 \
            https://manuscript-alert-api.onrender.com/api/v1/health
        continue-on-error: true
