name: Regression Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PLAYWRIGHT_BASE_URL: http://localhost:3000
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Lint + Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          cd frontend && npm ci

      # Backend
      - name: Ruff check
        run: ruff check backend/ tests/

      - name: Ruff format check
        run: ruff format --check backend/ tests/

      - name: Backend tests
        run: pytest -v

      # Frontend
      - name: Frontend component tests
        run: npm test
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          # Bake the backend API URL into the bundle so E2E tests can reach it.
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

      # E2E (visual regression is opt-in: VR=1)
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Start backend
        run: uvicorn backend.src.main:app --host 0.0.0.0 --port 8000 &

      - name: Start frontend server
        run: npx next start -p 3000 &
        working-directory: frontend

      - name: Wait for servers
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/v1/health && \
            curl -sf http://localhost:3000 && break
            sleep 2
          done

      - name: E2E tests
        run: npm run test:e2e
        working-directory: frontend
